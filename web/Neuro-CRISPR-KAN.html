<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neuro-CRISPR-KAN | Off-Target Risk Prediction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: #0A0E1A;
      color: #fff;
      font-family: 'Space Grotesk', sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0A0E1A; }
    ::-webkit-scrollbar-thumb { background: rgba(0,229,255,0.2); border-radius: 2px; }

    input:focus {
      outline: none !important;
      border-color: rgba(0,229,255,0.45) !important;
      box-shadow: 0 0 0 3px rgba(0,229,255,0.08) !important;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(8px); }
    }
    @keyframes slideUpBounce {
      from { opacity: 0; transform: translateY(30px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }
    @keyframes slideInRight {
      from { opacity: 0; transform: translateX(20px); }
      to   { opacity: 1; transform: translateX(0); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(24px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes pulseGlow {
      0%, 100% { box-shadow: 0 0 20px rgba(0,229,255,0.2); }
      50%       { box-shadow: 0 0 40px rgba(0,229,255,0.45); }
    }

    .hover-lift {
      transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease;
    }
    .hover-lift:hover {
      transform: translateY(-2px);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
      border-color: rgba(255,255,255,0.14) !important;
    }

    /* Animated bg gradient */
    .bg-gradient-anim {
      position: fixed; inset: 0; z-index: 0; pointer-events: none;
      background:
        radial-gradient(ellipse 100% 80% at 0% 0%, rgba(0,229,255,0.04) 0%, transparent 55%),
        radial-gradient(ellipse 80% 70% at 100% 100%, rgba(255,61,154,0.04) 0%, transparent 55%);
      animation: bgShift 18s ease-in-out infinite alternate;
    }
    @keyframes bgShift {
      from { opacity: 0.6; }
      to   { opacity: 1; }
    }

    /* Section fade-in on scroll */
    .section-reveal {
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.7s ease, transform 0.7s ease;
    }
    .section-reveal.visible {
      opacity: 1;
      transform: translateY(0);
    }
  </style>
</head>
<body>
  <div class="bg-gradient-anim"></div>
  <div id="root"></div>

  <!-- Component scripts loaded in dependency order -->
  <script type="text/babel" src="components/Background.jsx"></script>
  <script type="text/babel" src="components/HeroSection.jsx"></script>
  <script type="text/babel" src="components/CasScanAnimation.jsx"></script>
  <script type="text/babel" src="components/ExplainabilityDashboard.jsx"></script>
  <script type="text/babel" src="components/InsightsPanel.jsx"></script>

  <script type="text/babel">
    const App = () => {
      const [result, setResult] = React.useState(null);

      // Scroll reveal
      React.useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => entries.forEach(e => {
            if (e.isIntersecting) e.target.classList.add('visible');
          }),
          { threshold: 0.08 }
        );
        document.querySelectorAll('.section-reveal').forEach(el => observer.observe(el));
        return () => observer.disconnect();
      }, [result]);

      return (
        <div style={{ position: 'relative', zIndex: 1, maxWidth: 1280, margin: '0 auto' }}>
          <Background />

          {/* Section 1 — Hero */}
          <HeroSection onRun={setResult} />

          {/* Section 2 — Cas9 Scan */}
          {result && (
            <div className="section-reveal visible">
              <CasScanAnimation result={result} />
            </div>
          )}

          {/* Section 3 — Explainability */}
          {result && (
            <div className="section-reveal visible">
              <ExplainabilityDashboard result={result} />
            </div>
          )}

          {/* Section 4 — Insights */}
          {result && (
            <div className="section-reveal visible">
              <InsightsPanel result={result} />
            </div>
          )}

          {/* Section 5 — Footer (always visible) */}
          <AppFooter />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
