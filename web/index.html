<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neuro-CRISPR · Off-Target Cleavage Prediction</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin="anonymous" />
  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.5/dist/ScrollTrigger.min.js"></script>

  <style>
    :root {
      /* ── Daylight Lab palette ───────────────────────── */
      --paper:       #FAF7F0;
      --paper-2:     #F0EBDD;
      --paper-3:     #E8E0CB;
      --ink:         #1A1A1A;
      --ink-soft:    #525252;
      --ink-faint:   #8C8579;
      --hairline:    #E5E0D2;
      --margin-red:  #B91C1C;

      --teal:        #0D6E64;
      --teal-2:      #14B8A6;
      --teal-soft:   #CFF1EB;
      --teal-tint:   rgba(13,110,100,0.06);

      --rust:        #B45309;
      --rust-soft:   #FCE9CC;
      --danger:      #C92A2A;
      --danger-soft: #FCE0E0;
      --safe:        #166534;
      --safe-soft:   #DBEEDB;
      --gold:        #B7791F;

      /* ── Cinema inset (dark animation card) ─────────── */
      --inset-bg:    #0E1424;
      --inset-bg-2:  #131A2E;
      --inset-ink:   #F1F4FA;
      --inset-soft:  rgba(255,255,255,0.55);
      --inset-faint: rgba(255,255,255,0.15);

      /* ── IGV/UCSC base colors (biology convention) ──── */
      --base-A:      #00C853;  /* green */
      --base-T:      #DC2626;  /* red   */
      --base-G:      #B7791F;  /* gold  */
      --base-C:      #2962FF;  /* blue  */
      --base-N:      #71717A;  /* grey  */

      /* ── Severity (off-target context) ──────────────── */
      --sev-low:     var(--safe);
      --sev-mod:     var(--rust);
      --sev-high:    var(--danger);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--paper);
      color: var(--ink);
      font-family: 'Inter', system-ui, sans-serif;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }

    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: var(--paper); }
    ::-webkit-scrollbar-thumb { background: var(--paper-3); border-radius: 3px; }

    input:focus, button:focus-visible {
      outline: none !important;
      border-color: var(--teal) !important;
      box-shadow: 0 0 0 3px rgba(13,110,100,0.12) !important;
    }

    /* ============== SUBTLE PAPER GRAIN ============== */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: -2; pointer-events: none;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.7' numOctaves='2' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-size: 240px 240px;
      opacity: 0.35;
      mix-blend-mode: multiply;
    }
    /* Soft warm gradient wash — sun through a window */
    body::after {
      content: '';
      position: fixed; inset: 0; z-index: -1; pointer-events: none;
      background:
        radial-gradient(ellipse 60% 40% at 12% 8%,  rgba(13,110,100,0.05) 0%, transparent 70%),
        radial-gradient(ellipse 60% 50% at 88% 92%, rgba(180,83,9,0.05)   0%, transparent 70%);
    }

    /* ============== ANIMATIONS ============== */
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes bounce { 0%,100% { transform: translateY(0); } 50% { transform: translateY(8px); } }
    @keyframes slideUpBounce { from { opacity:0; transform: translateY(30px) scale(0.96); } to { opacity:1; transform: translateY(0) scale(1); } }
    @keyframes slideInRight { from { opacity:0; transform: translateX(20px); } to { opacity:1; transform: translateX(0); } }
    @keyframes fadeInUp { from { opacity:0; transform: translateY(24px); } to { opacity:1; transform: translateY(0); } }
    @keyframes blink { 50% { opacity: 0; } }

    /* ============== CARD HOVERS ============== */
    .hover-lift { transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; }
    .hover-lift:hover {
      transform: translateY(-2px);
      box-shadow: 0 18px 40px rgba(20,20,20,0.10);
      border-color: var(--teal) !important;
    }

    /* ============== SECTION SCROLL-REVEAL ============== */
    .section-reveal { opacity: 0; transform: translateY(24px); transition: opacity 0.7s ease, transform 0.7s ease; }
    .section-reveal.visible { opacity: 1; transform: translateY(0); }

    /* ============== LAB NOTEBOOK PAPER (audit) ============== */
    .lab-paper {
      background:
        linear-gradient(rgba(252,247,235,0.99), rgba(252,247,235,0.99)),
        url("data:image/svg+xml,%3Csvg viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.6' numOctaves='2' /%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.4'/%3E%3C/svg%3E");
      background-size: cover;
      color: #1a1a1a;
      position: relative;
      overflow: hidden;
    }
    .lab-paper-margin {
      position: absolute; left: 56px; top: 0; bottom: 0; width: 1px;
      background: rgba(220, 60, 80, 0.55);
    }
    .lab-paper-rules {
      position: absolute; inset: 0; pointer-events: none;
      background-image: repeating-linear-gradient(
        180deg, transparent 0, transparent 27px,
        rgba(70, 130, 200, 0.18) 27px, rgba(70, 130, 200, 0.18) 28px
      );
    }
    .lab-paper-edge {
      position: absolute; left: 0; top: 0; bottom: 0; width: 24px;
      background: linear-gradient(90deg, rgba(0,0,0,0.04), transparent);
    }

    /* ============== HEADLINE RULE (Nature-style) ============== */
    h1, h2, h3, h4 {
      font-family: 'Source Serif 4', Georgia, serif;
      letter-spacing: -0.01em;
      color: var(--ink);
      font-weight: 700;
    }

    /* Section number ornaments */
    .section-num {
      font-family: 'Source Serif 4', Georgia, serif;
      font-style: italic;
      color: var(--teal);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel" src="components/Background.jsx"></script>
  <script type="text/babel" src="components/HeroSection.jsx"></script>
  <script type="text/babel" src="components/CasScanAnimation.jsx"></script>
  <script type="text/babel" src="components/ExplainabilityDashboard.jsx"></script>
  <script type="text/babel" src="components/InsightsPanel.jsx"></script>

  <script type="text/babel">
    const App = () => {
      const [result, setResult] = React.useState(null);
      const [scanDone, setScanDone] = React.useState(false);

      const handleRun = (r) => { setScanDone(false); setResult(r); };
      const handleScanComplete = React.useCallback(() => setScanDone(true), []);

      React.useEffect(() => {
        const observer = new IntersectionObserver(
          (entries) => entries.forEach(e => {
            if (e.isIntersecting) e.target.classList.add('visible');
          }),
          { threshold: 0.08 }
        );
        document.querySelectorAll('.section-reveal').forEach(el => observer.observe(el));
        return () => observer.disconnect();
      }, [result, scanDone]);

      // Once analysis is complete, ease the user down into the gauge.
      React.useEffect(() => {
        if (scanDone) {
          setTimeout(() => {
            const el = document.getElementById('explain-section');
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
          }, 3500);
        }
      }, [scanDone]);

      return (
        <div style={{ position: 'relative', zIndex: 1, maxWidth: 1180, margin: '0 auto' }}>
          <Background />
          <HeroSection onRun={handleRun} />
          {result && <div className="section-reveal visible"><CasScanAnimation result={result} onComplete={handleScanComplete} /></div>}
          {result && scanDone && <div id="explain-section" className="section-reveal visible"><ExplainabilityDashboard result={result} /></div>}
          {result && scanDone && <div className="section-reveal visible"><InsightsPanel result={result} autoAudit={true} /></div>}
          <AppFooter />
        </div>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
